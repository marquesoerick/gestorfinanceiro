server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy reverso para Supabase — elimina CORS completamente
    # O browser faz requisições same-origin (mesmo domínio)
    location /sb/ {
        proxy_pass https://iehuwakiloottbyrnsqd.supabase.co/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host iehuwakiloottbyrnsqd.supabase.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    # Suporte para React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de arquivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
